<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

</head>

<body>

<!-- ================= HERO ================= -->
<div class="hero">

    <!-- glass bar -->
    <div class="top-glass-bar"></div>

    <div class="overlay">

        <!-- LOGO -->
        <div class="logo-block">
            <img src="./home/logo-nju.png" class="logo-img">

            <div class="logo-text">
                <div class="logo-line1">Institute of Modern Biology</div>
                <div class="logo-line2">Nanjing University</div>
            </div>
        </div>

        <!-- NAV -->
        <div class="top-right">
            <a href="team.html">Team</a>
            <a href="research.html">Research</a>
            <a href="publications.html">Publications</a>
            <a href="moments.html">Moments</a>
            <a href="join.html">Join</a>
            <a href="resources.html">Resources</a>
            <a href="index.html">Home</a>
        </div>

        <!-- CENTER -->
        <div class="hero-center">
            <div class="lab-title">WU Lab</div>
            <h1>Spatial Aging Biology & Disease</h1>
        </div>

        <!-- ================= COVER FLOW STRIP ================= -->
        <div class="photo-strip-wrapper">
            <div class="photo-strip" id="flow">

                <video autoplay muted loop playsinline>
                    <source src="./home/home_1.mp4">
                </video>

                <img src="./home/home_2.jpg">
                <img src="./home/home_3.jpg">
                <img src="./home/home_4.jpg">
                <img src="./home/home_5.jpg">
                <img src="./home/home_6.jpg">
                <img src="./home/home_7.jpg">
                <img src="./home/home_8.jpg">

            </div>
        </div>

        <!-- SCROLL -->
        <div class="scroll-down">
            <div class="circle">
                <div class="arrow">⌄</div>
            </div>
        </div>

    </div>
</div>

<!-- ================= JS (核心 cover flow) ================= -->
<script>
const container = document.getElementById("flow");
const items = container.querySelectorAll("img, video");

function update() {
    const center = window.innerWidth / 2;

    items.forEach(el => {
        const rect = el.getBoundingClientRect();
        const itemCenter = rect.left + rect.width / 2;

        let distance = Math.abs(center - itemCenter);

        let scale = 1.4 - distance / 600;
        scale = Math.max(0.7, scale);

        el.style.transform = `scale(${scale})`;
        el.style.zIndex = Math.floor(scale * 10);
        el.style.opacity = scale < 0.8 ? 0.6 : 1;
    });
}

container.addEventListener("scroll", update);
window.addEventListener("resize", update);
update();
</script>

</body>
</html>
