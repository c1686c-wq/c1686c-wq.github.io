<!-- ===== MODAL ===== -->
<div id="modal" class="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modal-img">
        <h2 id="modal-name"></h2>
        <p id="modal-desc"></p>
    </div>
</div>

<!-- ===== JS ===== -->
<script>
const data = {
    wu: {
        name: "Prof. Wu",
        img: "images/prof.jpg",
        desc: "Principal Investigator. Focus on aging biology and metabolism."
    },
    alice: {
        name: "Alice",
        img: "images/student1.jpg",
        desc: "PhD student studying ROS signaling."
    },
    bob: {
        name: "Bob",
        img: "images/student2.jpg",
        desc: "Master student working on lipid metabolism."
    },
    staff1: {
        name: "Technician Li",
        img: "images/student2.jpg",
        desc: "Responsible for lab management and support."
    }
};

function openModal(id) {
    const m = data[id];
    document.getElementById("modal").style.display = "flex";
    document.getElementById("modal-img").src = m.img;
    document.getElementById("modal-name").innerText = m.name;
    document.getElementById("modal-desc").innerText = m.desc;
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}
</script>
